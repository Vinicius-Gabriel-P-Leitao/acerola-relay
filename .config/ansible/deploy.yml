---
- name: Deploy Acerola Relay
  hosts: relay_servers
  # Removido become: yes pois estamos logando como root
  vars:
    deploy_path: "/opt/acerola-relay"

  tasks:
    - name: Install dependencies (Rocky Linux)
      dnf:
        name:
          - dnf-plugins-core
          - firewalld
          - git
          - curl
          - rsync
        state: present

    - name: Add Docker repository
      command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo

    - name: Install Docker
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Start and enable services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - docker
        - firewalld

    - name: Configure firewall
      firewalld:
        port: "{{ item }}"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - 80/tcp
        - 443/tcp
        - 443/udp
        - 7824/udp

    - name: Create deploy directory
      file:
        path: "{{ deploy_path }}"
        state: directory
        mode: '0755'

    - name: Sync project files to server
      synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ deploy_path }}/"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=target"
          - "--exclude=.git"
          - "--exclude=*.user"
          - "--exclude=.cargo"

    - name: Create .env file for Docker Compose
      copy:
        dest: "{{ deploy_path }}/.config/docker/.env"
        content: |
          ACEROLA_EMAIL={{ acerola_email }}
          ACEROLA_DOMAIN={{ acerola_domain }}
        mode: '0600'

    - name: Run docker compose
      command: docker compose up -d --build
      args:
        chdir: "{{ deploy_path }}/.config/docker"

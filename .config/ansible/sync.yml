---
- name: Deploy Update Acerola Relay
  hosts: relay_servers
  # No deploy de CI/CD, assumimos que o rsync/docker já existem
  vars:
    deploy_path: "/opt/acerola-relay"

  tasks:
    - name: Sync latest code to server
      synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ deploy_path }}/"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=target"
          - "--exclude=.git"
          - "--exclude=*.user"
          - "--exclude=.cargo"

    - name: Update .env file
      copy:
        dest: "{{ deploy_path }}/.config/docker/.env"
        content: |
          EMAIL={{ email }}
          DOMAIN={{ domain }}
        mode: '0600'

    - name: Rebuild and restart containers
      command: docker compose up -d --build
      args:
        chdir: "{{ deploy_path }}/.config/docker"
      async: 600
      poll: 15

    - name: Copy Caddy config to proxy container
      command: docker cp {{ deploy_path }}/.config/docker/acerola-relay.caddy acerola-proxy:/etc/caddy/conf.d/acerola-relay.caddy

    - name: Reload Caddy config
      command: docker exec acerola-proxy caddy reload --config /etc/caddy/Caddyfile
      register: caddy_reload
      failed_when:
        - caddy_reload.rc != 0
        - '"No such container" not in caddy_reload.stderr'
      changed_when: caddy_reload.rc == 0

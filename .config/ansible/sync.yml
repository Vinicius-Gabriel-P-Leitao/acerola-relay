
- name: Deploy Update Acerola Relay
  hosts: relay_servers
  vars:
    deploy_path: "/opt/acerola-relay"
    ansible_ssh_common_args: "-o ServerAliveInterval=30 -o ServerAliveCountMax=20"

  tasks:
    - name: Sync latest code to server
      synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ deploy_path }}/"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=target"
          - "--exclude=.git"
          - "--exclude=*.user"
          - "--exclude=.cargo"

    - name: Update .env file
      copy:
        dest: "{{ deploy_path }}/.config/docker/.env"
        content: |
          EMAIL={{ email }}
          DOMAIN={{ domain }}
        mode: '0600'

    - name: Rebuild and restart containers
      command: docker compose up -d --build
      args:
        chdir: "{{ deploy_path }}/.config/docker"

    - name: Copy Caddy config to conf.d
      copy:
        src: "{{ deploy_path }}/.config/docker/acerola-relay.caddy"
        dest: "/opt/caddy/conf.d/acerola-relay.caddy"
        mode: '0644'

    - name: Reload Caddy config
      command: docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      register: caddy_reload
      failed_when:
        - caddy_reload.rc != 0
        - '"No such container" not in caddy_reload.stderr'
      changed_when: caddy_reload.rc == 0

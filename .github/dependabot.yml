version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "[chore]"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[chore]"

  - package-ecosystem: "docker"
    directory: "/.config/docker"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[chore]"

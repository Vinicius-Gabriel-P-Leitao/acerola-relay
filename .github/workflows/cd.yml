name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run Workspace Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-make and nextest
        run: |
          cargo install cargo-make --debug
          curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Check Formatting
        run: cargo make format

      - name: Run All Tests
        run: cargo make test-all

  deploy:
    name: Deploy to VPS
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and Rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible rsync

      - name: Setup SSH Agent and Key (Secure Pipe)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          ssh-keygen -p -P "$SSH_PASSPHRASE" -N "" -f /tmp/ssh_key
          ssh-add /tmp/ssh_key
          rm -f /tmp/ssh_key
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Create Ansible Inventory
        run: |
          echo "[relay_servers]" > .config/ansible/hosts.ini
          echo "$SERVER_IP ansible_user=root" >> .config/ansible/hosts.ini
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}

      - name: Run Deploy Playbook
        run: |
          ansible-playbook -i .config/ansible/hosts.ini .config/ansible/sync.yml \
          -e "email=${{ secrets.EMAIL }}" \
          -e "domain=${{ secrets.DOMAIN }}"
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
